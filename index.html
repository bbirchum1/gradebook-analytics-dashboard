// Build a once-per-student data context that all blocks read from.
// Computed in a useMemo upstream so 500 students doesn't recalculate on every keystroke.
function buildStudentContext(s, assignments, allStudents, classAvgAll, weights) {
  var ma = analyzeMissing(s, assignments, allStudents, weights);
  var below = allStudents.filter(function (st) {
    return st.average < s.average;
  }).length;
  var percentile = Math.round(below / allStudents.length * 100);
  var diffFromClass = Math.round((s.average - classAvgAll) * 10) / 10;
  var assignmentScores = assignments.map(function (a) {
    return {
      name: a,
      score: s.scores[a]
    };
  }).filter(function (x) {
    return x.score !== null && x.score > 0;
  });
  var best = assignmentScores.slice().sort(function (a, b) {
    return b.score - a.score;
  }).slice(0, 3);
  var worst = assignmentScores.slice().sort(function (a, b) {
    return a.score - b.score;
  }).slice(0, 3);
  var bestStrong = best.filter(function (a) {
    return a.score >= 80;
  });
  var worstWeak = worst.filter(function (a) {
    return a.score < 70;
  });
  var nonResubCats = {};
  if (weights && weights.categories && weights.mapping) {
    weights.categories.forEach(function (c) {
      if (c.resubmittable === false) nonResubCats[c.name] = true;
    });
  }
  var worstWeakResubmittable = worstWeak.filter(function (a) {
    if (!weights || !weights.mapping) return true;
    var cat = weights.mapping[a.name];
    return !cat || !nonResubCats[cat];
  });
  var ln = s.name.split(" ").slice(1).join(" ");
  return {
    s: s,
    firstName: s.name.split(" ")[0],
    lastName: ln,
    familyName: ln ? ln + " Family" : "Parent/Guardian",
    missingCount: ma.missing.length,
    missingDetails: ma.missing,
    totalIncrease: ma.totalIncrease || 0,
    allCompletedAvg: ma.allCompletedAvg,
    allCompletedGrade: ma.allCompletedGrade,
    change: 0,
    percentile: percentile,
    classAvg: Math.round(classAvgAll * 10) / 10,
    diffFromClass: diffFromClass,
    bestStrong: bestStrong,
    worstWeak: worstWeakResubmittable,
    best: best,
    worst: worst
  };
}

// Compose the actual email body from active blocks + per-student overrides
function composeEmail(ctx, activeBlocks, customTexts, perStudentOverrides) {
  var paragraphs = ["Dear " + ctx.familyName + ","];
  OUTREACH_BLOCKS.forEach(function (block) {
    if (!activeBlocks[block.key]) return;
    if (perStudentOverrides && perStudentOverrides[block.key] === false) return;
    if (!block.autoShow(ctx)) return;
    var custom = (customTexts || {})[block.key];
    var content;
    if (custom && custom.trim()) {
      // User has written custom text — fill placeholders
      content = fillBlockTemplate(custom, ctx);
    } else if (block.defaultTemplate) {
      // No custom text but block has a default template — fill that
      content = fillBlockTemplate(block.defaultTemplate, ctx);
    } else if (!block.isCustomText) {
      // Pure auto-generated (e.g. percentile) — use render function
      content = block.render(ctx);
    } else {
      content = "";
    }
    if (content && content.trim()) paragraphs.push(content);
  });
  return paragraphs.join("\n\n");
}

// Fill placeholders in any block's custom text
function fillBlockTemplate(template, ctx) {
  // Build missing list string from context
  var missingListStr = "";
  if (ctx.missingDetails && ctx.missingDetails.length > 0) {
    missingListStr = ctx.missingDetails.map(function (m) {
      return "- " + m.name + (m.impact ? " (+" + m.impact + " pts grade impact if completed)" : "");
    }).join("\n");
  }
  // Build projection string
  var projStr = "";
  if (ctx.missingCount > 0 && ctx.totalIncrease > 0) {
    projStr = "If all missing work is submitted at class-average scores, the grade is projected to be " + ctx.allCompletedAvg + "% (" + ctx.allCompletedGrade + ").";
  }
  // Build resubmit list (assignments below 70%)
  var resubmitStr = "";
  if (ctx.worstWeak && ctx.worstWeak.length > 0) {
    resubmitStr = ctx.worstWeak.map(function (a) {
      var label = a.subject ? a.name + " [" + a.subject + "]" : a.name;
      return "- " + label + " (" + a.score + "%)";
    }).join("\n");
  }
  // Build strengths list (top assignments ≥80%)
  var strengthsStr = "";
  if (ctx.bestStrong && ctx.bestStrong.length > 0) {
    var picks = ctx.bestStrong.slice(0, 3);
    var names = picks.map(function (a) {
      return (a.subject ? a.name + " [" + a.subject + "]" : a.name) + " (" + a.score + "%)";
    });
    strengthsStr = names.length === 1 ? names[0] : names.length === 2 ? names.join(" and ") : names.slice(0, -1).join(", ") + ", and " + names[names.length - 1];
  }
  return (template || "").replace(/\{STUDENT_FIRST\}/g, ctx.firstName || "").replace(/\{STUDENT_LAST\}/g, ctx.lastName || "").replace(/\{FAMILY_NAME\}/g, ctx.familyName || "").replace(/\{GRADE_PERCENT\}/g, (ctx.s ? ctx.s.average : "") + "%").replace(/\{GRADE_LETTER\}/g, ctx.s ? ctx.s.grade : "").replace(/\{MISSING_COUNT\}/g, (ctx.missingCount || 0) + "").replace(/\{MISSING_LIST\}/g, missingListStr).replace(/\{MISSING_PROJECTION\}/g, projStr).replace(/\{RESUBMIT_LIST\}/g, resubmitStr).replace(/\{STRENGTHS_LIST\}/g, strengthsStr);
}

// Subject line supports the same placeholders as the rest of the app
function fillSubjectTemplate(template, ctx) {
  return (template || "").replace(/\{STUDENT_FIRST\}/g, ctx.firstName).replace(/\{STUDENT_LAST\}/g, ctx.lastName || "").replace(/\{FAMILY_NAME\}/g, ctx.familyName || "").replace(/\{GRADE_PERCENT\}/g, ctx.s.average + "%").replace(/\{GRADE_LETTER\}/g, ctx.s.grade).replace(/\{MISSING_COUNT\}/g, ctx.missingCount + "");
}

// Build a linked context for ONE student aggregated across multiple selected subjects.
// `subjectScope` is an array of {sectionId, sectionName, data}. The linked roster entry tells
// us where this student appears in each subject. Returns a context shaped like buildStudentContext
// but with extra `bySubject` map and aggregated cross-subject metrics.
function buildLinkedContext(rosterEntry, subjectScope) {
  var bySubject = {};
  var subjectsPresent = [];
  subjectScope.forEach(function (sec) {
    var st = rosterEntry.bySubject[sec.sectionId];
    if (!st) return;
    var allStudents = sec.data.students;
    var classAvg = allStudents.length ? allStudents.reduce(function (s, x) {
      return s + x.average;
    }, 0) / allStudents.length : 0;
    var ctx = buildStudentContext(st, sec.data.assignments, allStudents, classAvg, sec.weights);
    ctx.sectionId = sec.sectionId;
    ctx.sectionName = sec.sectionName;
    bySubject[sec.sectionId] = ctx;
    subjectsPresent.push(sec);
  });

  // Aggregate metrics across selected subjects
  var ln = rosterEntry.name.split(" ").slice(1).join(" ");
  var firstName = rosterEntry.name.split(" ")[0];
  var totalMissing = 0,
    totalIncrease = 0;
  var subjectAverages = [];
  var allMissingDetails = [];
  var allWorstWeak = [];
  var allBestStrong = [];
  var bestSubject = null,
    worstSubject = null;
  subjectsPresent.forEach(function (sec) {
    var c = bySubject[sec.sectionId];
    if (!c) return;
    totalMissing += c.missingCount;
    totalIncrease += c.totalIncrease || 0;
    subjectAverages.push({
      name: sec.sectionName,
      avg: c.s.average,
      grade: c.s.grade
    });
    c.missingDetails.forEach(function (m) {
      allMissingDetails.push({
        name: m.name,
        impact: m.impact,
        subject: sec.sectionName
      });
    });
    c.worstWeak.forEach(function (w) {
      allWorstWeak.push({
        name: w.name,
        score: w.score,
        subject: sec.sectionName
      });
    });
    c.bestStrong.forEach(function (b) {
      allBestStrong.push({
        name: b.name,
        score: b.score,
        subject: sec.sectionName
      });
    });
    if (!bestSubject || c.s.average > bestSubject.avg) bestSubject = {
      name: sec.sectionName,
      avg: c.s.average,
      grade: c.s.grade
    };
    if (!worstSubject || c.s.average < worstSubject.avg) worstSubject = {
      name: sec.sectionName,
      avg: c.s.average,
      grade: c.s.grade
    };
  });
  // Cross-subject overall average (simple mean across present subjects)
  var overallAvg = subjectAverages.length ? Math.round(subjectAverages.reduce(function (s, x) {
    return s + x.avg;
  }, 0) / subjectAverages.length * 10) / 10 : 0;

  // Synthesize a primary "s" object so block render functions still work
  var anyCtx = null;
  for (var k in bySubject) {
    anyCtx = bySubject[k];
    break;
  }
  var primaryS = {
    id: rosterEntry.unifiedId,
    name: rosterEntry.name,
    email: rosterEntry.email || "",
    average: overallAvg,
    grade: lg(overallAvg),
    scores: {}
  };

  // Group missing details by subject for nicer block rendering
  var missingBySubject = {};
  allMissingDetails.forEach(function (m) {
    if (!missingBySubject[m.subject]) missingBySubject[m.subject] = [];
    missingBySubject[m.subject].push(m);
  });
  return {
    s: primaryS,
    isLinked: true,
    bySubject: bySubject,
    subjectsPresent: subjectsPresent.map(function (s) {
      return s.sectionName;
    }),
    subjectAverages: subjectAverages,
    bestSubject: bestSubject,
    worstSubject: worstSubject,
    firstName: firstName,
    lastName: ln,
    familyName: ln ? ln + " Family" : "Parent/Guardian",
    missingCount: totalMissing,
    missingDetails: allMissingDetails,
    missingBySubject: missingBySubject,
    totalIncrease: Math.round(totalIncrease * 10) / 10,
    allCompletedAvg: anyCtx ? anyCtx.allCompletedAvg : null,
    allCompletedGrade: anyCtx ? anyCtx.allCompletedGrade : null,
    change: 0,
    percentile: 0,
    classAvg: 0,
    diffFromClass: 0,
    bestStrong: allBestStrong,
    worstWeak: allWorstWeak,
    best: allBestStrong,
    worst: allWorstWeak
  };
}

// Default config the tab opens with — teacher intro/outro carry across sessions

/* ─── OUTREACH TAB ──────────────────── */
function OutreachTab({
  data,
  outreachConfig,
  setOutreachConfig,
  initialSelectedIds,
  classroomMode,
  allSections,
  linkedRoster,
  linkedRosterMap,
  cohortKeys,
  activeCohort,
  setActiveCohort,
  weights
}) {
  var isContained = classroomMode === "contained";
  var multiCohort = isContained && cohortKeys && cohortKeys.length >= 2;

  // In multi-cohort mode, filter sections to only those in the active cohort
  var sectionsWithData = isContained && allSections ? allSections.filter(function (sec) {
    if (!sec.data || !sec.data.students || !sec.data.students.length) return false;
    if (!multiCohort) return true;
    var secCohort = (sec.cohort || "").trim() || "(unlabeled)";
    return secCohort === activeCohort;
  }) : [];
  var multiSubject = isContained && sectionsWithData.length > 1;

  // Use the cohort-specific linked roster
  var effectiveRoster = multiCohort && linkedRosterMap && activeCohort ? linkedRosterMap[activeCohort] : linkedRoster;

  // Subject scope (which subjects to pull data from when composing). Default = all sections with data.
  var [subjectScope, setSubjectScope] = useState(function () {
    var initial = {};
    sectionsWithData.forEach(function (s) {
      initial[s.id] = true;
    });
    return initial;
  });
  // Re-sync scope when sections set changes (new upload, removal)
  useEffect(function () {
    if (!multiSubject) return;
    setSubjectScope(function (prev) {
      var n = {};
      var changed = false;
      sectionsWithData.forEach(function (s) {
        n[s.id] = prev[s.id] !== undefined ? prev[s.id] : true;
        if (prev[s.id] === undefined) changed = true;
      });
      // Drop scope entries for sections that no longer exist
      for (var k in prev) {
        if (!sectionsWithData.find(function (s) {
          return String(s.id) === String(k);
        })) changed = true;
      }
      return changed ? n : prev;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [sectionsWithData.map(function (s) {
    return s.id;
  }).join(",")]);
  function toggleSubjectScope(id) {
    setSubjectScope(function (p) {
      var n = {};
      for (var k in p) n[k] = p[k];
      n[id] = !n[id];
      return n;
    });
  }
  function setAllSubjectScope(value) {
    setSubjectScope(function (p) {
      var n = {};
      sectionsWithData.forEach(function (s) {
        n[s.id] = value;
      });
      return n;
    });
  }
  var scopedSections = sectionsWithData.filter(function (s) {
    return subjectScope[s.id];
  });
  var scopeCount = scopedSections.length;

  // In single-subject mode (departmentalized OR contained-with-one-subject), use the existing per-section data path.
  // In multi-subject contained mode, build linked contexts from the effectiveRoster across scoped sections.
  var students = multiSubject && scopeCount > 0 && effectiveRoster ? effectiveRoster.roster : data.students;
  var assignments = data.assignments;

  // Use parent-lifted config if present, otherwise fall back to defaults
  var config = outreachConfig || DEFAULT_OUTREACH_CONFIG;
  function updateConfig(updates) {
    var next = {
      subjectTemplate: config.subjectTemplate,
      activeBlocks: Object.assign({}, config.activeBlocks),
      customTexts: Object.assign({}, config.customTexts || {})
    };
    for (var k in updates) next[k] = updates[k];
    setOutreachConfig(next);
    // Persist to storage
    try {
